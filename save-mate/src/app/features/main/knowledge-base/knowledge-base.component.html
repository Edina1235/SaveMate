<div class="knowledge-base-container" [class]="screen">
    <div *ngIf="screen === 'mobile' && activeTitle !== ''"
        class="back-arrow">
        <i class="fa-solid fa-arrow-left"
            (click)="onClickBack()"></i>
    </div>
    <div *ngIf="(screen === 'mobile' && activeTitle === '') || screen === 'desktop'" class="title-container">
        <h1 class="title">Címek</h1>
        <div class="content">
            <ng-container *ngFor="let title of titles">
                <h2 class="article-title"
                    [class.active]="title === activeTitle"
                    (click)="onClickTitle(title)">{{title}}</h2>
            </ng-container>
        </div>
    </div>
    <div *ngIf="(screen === 'mobile' && activeTitle !== '') || screen === 'desktop'" class="article-container">
        <ng-container *ngFor="let article of articles">
            <ng-container *ngIf="(screen === 'mobile' && activeTitle === article.title) || screen === 'desktop'">
                <div class="article">
                    <h3 class="title">{{article.title}}</h3>
                    <p class="text">{{article.text}}</p>
                    <small class="footer">
                        <a class="link">{{article.resourceLink}}</a>
                        <span class="date">{{article.updateDate | date: 'yyyy.MM.dd.'}}</span>
                    </small>
                </div>
            </ng-container>
        </ng-container>
    </div>
</div>
