<div class="statistics-container">
    <div class="card">
        <div class="title">Javulás</div>
        <div class="content">
            <div class="chart" #lineChart></div>
        </div>
    </div>
    <div class="card">
        <div class="title">Költések (kategória szerint)</div>
        <div class="content">
            <div class="bars">
                <ng-container *ngFor="let spendingByIcon of spendingByIcons">
                    <div class="column">
                        <div class="bar" [style.background]="spendingByIcon.color" [style.height]="spendingByIcon.percent + '%'"></div>
                        <div class="icon">
                            <i [class]="spendingByIcon.icon"></i>
                        </div>
                    </div>
                </ng-container>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="title">Költségek aránya<i class="fa-solid fa-circle-info" (click)="onClickInfo()"></i></div>
        <div class="content">
            <div class="chart" #barChart></div>
        </div>
    </div>
</div>
