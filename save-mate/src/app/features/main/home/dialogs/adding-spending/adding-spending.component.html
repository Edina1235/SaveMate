<div class="card">
    <div class="header">
        <div class="title">{{data}}</div>
        <i class="fa-solid fa-xmark" (click)="onClickClose()"></i>
    </div>
    <div class="content">
        <app-expenses-row [expenses]="expensesInput" 
                            (expensesOutput)="setExpenses($event)"
                            (expensesCsvOutput)="setExpensesCsv($event)"
                            (incomes)="setIncomes($event)"
                            (validGroup)="setValidForm($event)"></app-expenses-row>
        <div class="button-container">
            <button [disabled]="!validForm" (click)="onClickSave()">Kész</button>
       </div>
    </div>
</div>
