<div class="spending-categories-container">
    <form [formGroup]="formGroup">
        <ng-container *ngFor="let icon of spendingCategoryIcons">
            <input id="category_{{ spendingCategoryIcons.indexOf(icon) }}" type="checkbox" [formControlName]="'category_' + spendingCategoryIcons.indexOf(icon)">
            <label for="category_{{ spendingCategoryIcons.indexOf(icon) }}"> <i [class]="icon"></i></label>
        </ng-container>
    </form>
</div>
